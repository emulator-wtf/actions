version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/invoke-session"
    schedule:
      interval: "weekly"
      time: "16:00"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/invoke-session"
    schedule:
      interval: "weekly"
      time: "16:00"
