name: Check
on:
  pull_request:
    paths:
    # sources & direct dependencies
    - src/**
    # npm/ts config
    - 'eslint.config.js'
    - '*.json'
    # lint action.yml files
    - '**/action.yml'
    # workflows, linted by zizmor
    - .github/workflows/**

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: jdx/mise-action@v4.0.1 # zizmor: ignore[unpinned-uses] immutable tag
    - run: mise lint
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
    - uses: jdx/mise-action@v4.0.1 # zizmor: ignore[unpinned-uses] immutable tag
      with:
        install: false
    - run: mise build
