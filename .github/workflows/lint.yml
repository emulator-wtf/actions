name: Check
on:
  pull_request:
    paths:
    # sources & direct dependencies
    - src/**
    # npm/ts config
    - 'eslint.config.js'
    - '*.json'
    # lint action.yml files
    - '**/action.yml'
    # workflow file itself
    - .github/workflows/lint.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v4
    - run: mise lint
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - name: Setup Node
      uses: actions/setup-node@v6.3.0
      with:
        node-version: '24'
    - uses: jdx/mise-action@v4
      with:
        install: false
    - run: mise build
