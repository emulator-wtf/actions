name: Test configure-credentials
permissions:
  contents: read
  id-token: write
on:
  pull_request:
    paths:
    # action metadata changes
    - configure-credentials/**
    # sources & direct dependencies
    - src/configure-credentials/**
    - src/lib/**
    # npm/ts config
    - '*.json'
    # workflow file itself
    - .github/workflows/test_configure_credentials.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
    - uses: jdx/mise-action@v4.0.1 # zizmor: ignore[unpinned-uses] immutable tag
      with:
        install: false
    - run: mise dist
    - uses: ./configure-credentials
      with:
        oidc-configuration-id: ${{ vars.EW_OIDC_ID }}
    - uses: ./setup-ew-cli
    - run: ew-cli --models
