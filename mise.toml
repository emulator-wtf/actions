[tools]
nodejs = '24.6.0'
python = '3.14.4'
pipx = '1.12.0'
yamllint = '1.38.0'

[tasks]
deps = 'npm ci'

[tasks.build]
run = 'npm run build'
depends = ['deps']

[tasks.lint]
run = [
  'npm run lint',
  'npm run prettier',
  'yamllint **/action.yml',
]
depends = ['deps']

[tasks.dist]
depends = ['build']
